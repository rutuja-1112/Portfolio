}
.flex-item{

padding:20px;
text-align:center;
margin:5px;

height:"150";
width:"150";
}
div img
{
border:1px solid black;
border-radius:15px;
}
h1{
text-align:Center;
background-color:pink;
border:1px solid black;
}
h2{
text-align:center;
background-color:grey;
border:1px solid black;
}
</style>
</head>
<body>

>
</div>

>

>

<div class="box">
