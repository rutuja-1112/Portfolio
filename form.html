<html>
<title>form practical</title>
<head>
<center><h1>Shri Sant Gajanan Maharaj College Of Engineering,shegaon</h1></center>
<div class="container">
<center><h2>Student Registration Form</h2></center>
</head>
<body bgcolour="lightblue"text ="black">
<form action="submit_form.html">
<label for="fname">first name:</label>
<input type="text"id="fname"name="firstname"placeholder="Enter your first name"required maxlength="40"><br><br>
<label for ="lname">last name:</label>
<input type="text"id="lname"name="lastname"placeholder="Enter your first name"required maxlength="40"><br><br>
<label for"password">password:</label>
<input type="password"id="password"name="password"minlength="8"required><br><br>
<label for="email">Email:</label>
<input type="email"id="email"name="email"placeholder="example@gmail.com"required><br><br>
<label for="gender">Gender:</label>
<input type="radio"id="male"name="male"value="male">
<label for="male">Male</label>
<input type="radio"id="female"name="gender"value="female">
<label for="female">female</label><br><br>
<label for="age">Age:</label>
<input type="number"id="age"name="age"min="17"max="30"><br><br>
<label>Hobbies:</label>
<input type="checkbox"id="Dancing"name="hobby"value="Dancing">
<label for="dancing">Dancing</label>
<input type="checkbox"id="Sports"name="sport"value="sport">
<label for="sports">Sports</label>
<input type="checkbox"id="Gaming"name="Gaming"value="gaming">
<label for="gaming">Gaming</label><br><br>
<label for="Address">Address:</label><br><br>
<textarea id="address"name="address"rows="4"placeholder="Enter your permanent address"></textarea><br><br>
<label for="photo">Upload photo:</label><br><br>
<input type="file" id="photo"name="photo"accept="image/*"><br><br>
<input type="hidden"name="formid"value="09876">
<label for="dob">Date of birth:</label>
<input type="date"id="dob"name="dob"><br><br>
<label for ="course">Select Course:</label>
<select id="course"name="course">
<option value=>-----select-----</option><br><br>
<option value="btech">B.tech</option>
<option value="be">B.E</option>
<option value="mba">MBA</option>
<option value="mtech">M.tech</option></select><br><br>
<input type="Submit"value="Submit Form">
<input type="Reset"value="Reset">
<h2><THANK YOU></h2>
</form>
</div>
</body>
</html>
